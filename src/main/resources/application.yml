# ทุกค่าจาก env — feed-service เป็นเจ้าของ DB ของตัวเอง (feeddb) แยกขาดจาก auth
server:
  port: ${SERVER_PORT:8083}
  shutdown: graceful

logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [%X{requestId:-—}] %logger{24} : %msg%n"

spring:
  application:
    name: feed-service
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate

jwt:
  secret: ${JWT_SECRET}
